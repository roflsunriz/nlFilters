<!doctype html>
<html lang="ja" data-fixture="watch">
<head>
  <meta charset="utf-8">
  <title>nlFilter Lab - 視聴ページ</title>
  <style>
    :root { color-scheme: light; font-family: "Yu Gothic UI", sans-serif; color: #20242d; background: #f2f4f7; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    .site-header { padding: 14px 24px; background: #252a34; color: white; font-weight: 700; }
    main { width: min(1120px, calc(100% - 28px)); margin: 22px auto; }
    .player-shell { aspect-ratio: 16 / 7; display: grid; place-items: center; border-radius: 12px; background: #11151c; color: white; }
    video { width: min(70%, 720px); height: 70%; background: #050608; }
    .content-grid { display: grid; grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); gap: 22px; margin-top: 20px; }
    .panel { border: 1px solid #d7dce4; border-radius: 10px; padding: 16px; background: white; }
    .video-list { display: grid; gap: 12px; }
    .video-card, .VideoMediaObject { display: grid; grid-template-columns: 132px 1fr; gap: 12px; position: relative; }
    .VideoMediaObject-thumbnail, .Thumbnail { display: block; position: relative; }
    img { display: block; width: 100%; border-radius: 7px; }
    a { color: #2464a8; text-decoration: none; }
    .VideoMediaObject-title { align-self: center; font-weight: 700; }
    @media (max-width: 700px) { .content-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="site-header">ニコニコ動画風ローカルfixture</header>
  <meta name="server-response" content="{&quot;meta&quot;:{&quot;status&quot;:200},&quot;data&quot;:{&quot;response&quot;:{&quot;video&quot;:{&quot;id&quot;:&quot;sm9&quot;,&quot;title&quot;:&quot;テスト動画&quot;}}}}">
  <main>
    <section class="player-shell">
      <div><div><div><div><div id="lab-video-slot"></div></div></div></div></div>
    </section>
    <div class="content-grid">
      <section class="panel">
        <h1>テスト動画 sm9</h1>
        <p>説明欄にあるURL: https://www.nicovideo.jp/watch/sm83</p>
        <p><a href="/watch/sm9">現在の動画へのリンク</a></p>
        <div class="BottomMainContainer"><div class="InViewRenderer"></div></div>
      </section>
      <aside class="panel PlayerPanelContainer-content">
        <h2>関連動画</h2>
        <div class="WatchRecommendation video-list" data-lab-spa-target>
          <article class="VideoMediaObject video-card Pressable" data-decoration-video-id="sm83">
            <a class="RouterLink VideoMediaObject-figure" href="/watch/sm83"><span class="VideoMediaObject-thumbnail"><img src="/thumbnails/sm83.svg" alt=""></span></a>
            <a class="RouterLink VideoMediaObject-title" href="/watch/sm83">関連動画 sm83</a>
          </article>
          <article class="VideoMediaObject video-card Pressable" data-decoration-video-id="sm2057168">
            <a class="RouterLink VideoMediaObject-figure" href="https://www.nicovideo.jp/watch/sm2057168"><span class="VideoMediaObject-thumbnail"><img src="/thumbnails/sm2057168.svg" alt=""></span></a>
            <a class="RouterLink VideoMediaObject-title" href="/watch/sm2057168">関連動画 sm2057168</a>
          </article>
        </div>
      </aside>
    </div>
  </main>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      setTimeout(function() {
        var video = document.createElement("video");
        video.dataset.name = "video-content";
        video.controls = true;
        document.querySelector("#lab-video-slot").append(video);
      }, 0);
    });
  </script>
</body>
</html>
